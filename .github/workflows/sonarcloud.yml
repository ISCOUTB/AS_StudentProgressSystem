name: SonarCloud Analysis

on:
  push:
    branches: [main, autentication, feat-conexion-esquema-base-datos, demos]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Backend: FastAPI ──────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov httpx

      - name: Run Python tests + coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=app --cov-report=xml:coverage.xml --cov-omit='venv/*'

        continue-on-error: true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
         name: coverage-report
         path: coverage.xm
      # ── SonarCloud ────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}