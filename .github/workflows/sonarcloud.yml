name: SonarCloud Analysis

on:
  push:
    branches: [master, develop, demos]
  pull_request:
    branches: [master, develop, demos]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Backend: FastAPI ──────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov httpx

      - name: Run Python tests + coverage
        run: |
          cd backend
          python -m pytest app/ tests/ --cov=app --cov-report=xml --cov-omit=venv/*
        continue-on-error: true

      # ── Frontend: Next.js ─────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci --prefix frontend

      - name: Run Next.js tests + coverage
        run: |
          cd frontend
          npm run test -- --coverage --watchAll=false
        continue-on-error: true

      # ── SonarCloud ────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}